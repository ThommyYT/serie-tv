<!-- 2. NAVIGAZIONE CENTRALE E SEARCH -->
<div class="col-md-auto flex-grow-1">
    <ul class="nav justify-content-center gap-2 align-items-center">
        <li class="nav-item">
            <a href="javascript:void(0)" id="btn-home"
                class="btn btn-outline-primary shadow-sm rounded-pill bg-gradient">

        </li>
        <li class="nav-item">

            </a>
        </li>
        <!-- SEARCH BAR con larghezza fissa per evitare il salto di riga -->

                </datalist>
                <button class="btn btn-primary bg-gradient" id="search-btn" type="submit">

                </button>
            </form>
        </li>

services:
  app:
    image: tomsik68/xampp:latest
    container_name: xampp-server
    ports:
      - "80:80"   # Apache (Sito)
      - "3306:3306" # MySQL
    volumes:
      # Monta i tuoi file dalla cartella principale del progetto alla cartella www di XAMPP
      - ..:/www  # Monta la root del tuo progetto Codespaces in /www
    restart: always

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - BROWSER_TIMEOUT=20000 # Chiude il browser se la sfida ci mette troppo
      - MAX_TIMEOUT=60000
      - SHELL=/bin/bash
    ports:
      - "8191:8191"
    restart: always
